<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدروس والامتحانات</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--secondary-color);
        }

        header {
            background-color: var(--secondary-color);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        nav button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        nav button:hover {
            background-color: #357abd;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }

        .page {
            display: none;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .active-page {
            display: block;
        }

        /* صفحة الطلاب */
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .class-btn {
            background: #eef2f7;
            border: 2px solid #dcdde1;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .class-btn:hover, .class-btn.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .content-section {
            border-top: 2px solid #eef2f7;
            padding-top: 20px;
        }

        .item-card {
            background: #fff;
            border-right: 5px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .item-card.exam {
            border-right-color: var(--accent-color);
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
            color: white;
            font-weight: bold;
            margin-left: 10px;
        }

        .badge.lesson { background-color: var(--primary-color); }
        .badge.exam-type { background-color: var(--accent-color); }

        /* صفحة الأستاذ وقفل الأمان */
        .login-box, .panel-box {
            text-align: center;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .form-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        .form-btn:hover { background-color: #27ae60; }
        
        .error-msg { color: var(--accent-color); margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>منصتنا التعليمية الرقمية</h1>
        <nav>
            <button onclick="showPage('student-page')">بوابة الطلاب</button>
            <button onclick="showPage('teacher-login-page')">لوحة التحكم (الأستاذ)</button>
        </nav>
    </header>

    <div class="container">
        
        <div id="student-page" class="page active-page">
            <h2>اختر الصف الدراسي لعرض المواد:</h2>
            <div class="classes-grid">
                <button class="class-btn" onclick="loadClassContent(1, this)">الصف الأول</button>
                <button class="class-btn" onclick="loadClassContent(2, this)">الصف الثاني</button>
                <button class="class-btn" onclick="loadClassContent(3, this)">الصف الثالث</button>
                <button class="class-btn" onclick="loadClassContent(4, this)">الصف الرابع</button>
                <button class="class-btn" onclick="loadClassContent(5, this)">الصف الخامس</button>
            </div>

            <div class="content-section">
                <h3 id="selected-class-title">الرجاء اختيار صف لعرض المحتوى</h3>
                <div id="content-list">
                    </div>
            </div>
        </div>

        <div id="teacher-login-page" class="page">
            <div class="login-box">
                <h2>دخول الأستاذ (محمي)</h2>
                <p>الرجاء إدخال الرمز السري المكون من 4 أرقام:</p>
                <input type="password" id="pin-input" maxlength="4" placeholder="••••" style="text-align: center; font-size: 24px; letter-spacing: 10px;">
                <button class="form-btn" onclick="verifyPin()">دخول</button>
                <p id="login-error" class="error-msg"></p>
            </div>
        </div>

        <div id="teacher-panel-page" class="page">
            <div class="panel-box">
                <h2>لوحة تحكم الأستاذ - إضافة محتوى جديد</h2>
                
                <label for="target-class">اختر الصف المستهدف:</label>
                <select id="target-class">
                    <option value="1">الصف الأول</option>
                    <option value="2">الصف الثاني</option>
                    <option value="3">الصف الثالث</option>
                    <option value="4">الصف الرابع</option>
                    <option value="5">الصف الخامس</option>
                </select>

                <label for="content-type">نوع المحتوى:</label>
                <select id="content-type">
                    <option value="درس">درس جديد</option>
                    <option value="امتحان">امتحان</option>
                </select>

                <label for="content-title">عنوان الدرس أو الامتحان:</label>
                <input type="text" id="content-title" placeholder="مثال: درس القراءة / امتحان الشهر الأول">

                <label for="content-details">تفاصيل أو رابط المحتوى:</label>
                <textarea id="content-details" rows="4" placeholder="اكتب تفاصيل الدرس أو ضع رابط الامتحان هنا..."></textarea>

                <button class="form-btn" onclick="addContent()">نشر المحتوى فوراً</button>
                <button class="form-btn" onclick="logoutTeacher()" style="background-color: #7f8c8d; margin-top: 10px;">تسجيل الخروج</button>
            </div>
        </div>

    </div>

    <script>
        // الرمز السري الافتراضي للأستاذ (يمكنك تغييره من هنا)
        const TEACHER_PIN = "1234";

        // قاعدة بيانات وهمية لتخزين الدروس والامتحانات (تخزن في متصفحك الحالي)
        let schoolData = JSON.parse(localStorage.getItem('schoolData')) || {
            1: [{type: 'درس', title: 'مقدمة في الحروف العربية', details: 'الرجاء قراءة الدرس الأول وكتابته في الدفتر.'}],
            2: [],
            3: [],
            4: [],
            5: []
        };

        // دالة التنقل بين الصفحات
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            
            // إعادة تعيين حقل الرمز السري عند الدخول لصفحة الدخول
            if(pageId === 'teacher-login-page') {
                document.getElementById('pin-input').value = '';
                document.getElementById('login-error').innerText = '';
            }
        }

        // دالة التحقق من الرمز السري للأستاذ
        function verifyPin() {
            const enteredPin = document.getElementById('pin-input').value;
            if (enteredPin === TEACHER_PIN) {
                showPage('teacher-panel-page');
            } else {
                document.getElementById('login-error').innerText = "الرمز السري غير صحيح! حاول مجدداً.";
            }
        }

        // دالة خروج الأستاذ
        function logoutTeacher() {
            showPage('student-page');
        }

        // دالة إضافة محتوى من قبل الأستاذ
        function addContent() {
            const selectedClass = document.getElementById('target-class').value;
            const contentType = document.getElementById('content-type').value;
            const contentTitle = document.getElementById('content-title').value;
            const contentDetails = document.getElementById('content-details').value;

            if (!contentTitle || !contentDetails) {
                alert("الرجاء ملء جميع الحقول المتاحة!");
                return;
            }

            // إضافة البيانات الجديدة للمصفوفة الخاصة بالصف
            schoolData[selectedClass].push({
                type: contentType,
                title: contentTitle,
                details: contentDetails
            });

            // حفظ التحديثات في ذاكرة المتصفح المحلية (LocalStorage)
            localStorage.setItem('schoolData', JSON.stringify(schoolData));

            alert(`تمت إضافة ${contentType} بنجاح إلى الصف المطلوب!`);
            
            // تفريغ الحقول بعد الإضافة
            document.getElementById('content-title').value = '';
            document.getElementById('content-details').value = '';
        }

        // دالة عرض محتوى الصف عند ضغط الطالب عليه
        function loadClassContent(classNum, element) {
            // تفعيل لون الزر المضغوط
            document.querySelectorAll('.class-btn').forEach(btn => btn.classList.remove('selected'));
            if(element) element.classList.add('selected');

            const textRepresentation = ["", "الأول", "الثاني", "الثالث", "الرابع", "الخامس"];
            document.getElementById('selected-class-title').innerText = `محتوى الصف ${textRepresentation[classNum]}:`;

            const listContainer = document.getElementById('content-list');
            listContainer.innerHTML = ''; // تفريغ القائمة القديمة

            const items = schoolData[classNum];

            if (!items || items.length === 0) {
                listContainer.innerHTML = '<p style="color: #7f8c8d; font-style: italic;">لا توجد دروس أو امتحانات مضافة لهذا الصف حالياً.</p>';
                return;
            }

            // عرض العناصر المضافة
            items.forEach(item => {
                const isExam = item.type === 'امتحان';
                const card = document.createElement('div');
                card.className = `item-card ${isExam ? 'exam' : ''}`;
                
                card.innerHTML = `
                    <h3>
                        <span class="badge ${isExam ? 'exam-type' : 'lesson'}">${item.type}</span>
                        ${item.title}
                    </h3>
                    <p>${item.details}</p>
                `;
                listContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
